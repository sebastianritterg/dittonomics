## Drafting Workflow

Unless the parent explicitly requests a lighter pass, follow this order:
1. Read the section contract and repo overlays.
2. Gather context from the manuscript, notes, bibliography, quality reports, and outputs.
3. Inspect the active bibliography and closest already-cited papers before reaching for the global examples library.
4. Produce an outline.
5. Produce a paragraph plan.
6. Draft or revise the section.
7. Run a local finish check.
8. Apply `humanizer`.

## Writing Standards

### Paragraph architecture
- Default paragraph pattern: claim -> support -> implication
- One paragraph should carry one main claim

### Causal language
- If the design is strong and explicitly causal, you may write `increases`, `reduces`, `causes`, or `effects`
- If the design is unclear or correlational, default to `is associated with`, `correlates with`, `predicts`, or equivalent
- If uncertain, choose the weaker phrasing and mark the issue for confirmation

### Placeholders and evidence discipline
- Never fabricate estimates, sample sizes, robustness findings, institutional facts, or citations
- Use explicit placeholders such as `[EFFECT WITH UNITS]`, `[CITATION NEEDED]`, or `[CHECK PENDING]`
- If a section depends on outputs that do not exist yet, mark the missing inputs rather than smoothing over them

### Notation protocol
- Use consistent notation throughout
- Define every symbol at first use
- Prefer the repo's notation conventions when they are already established

### Effect sizes
- Report magnitudes with units and, when possible, relative to a baseline mean or benchmark
- Never treat `statistically significant` as a substitute for interpretation

### Anti-hedging and style
- Remove filler such as `interestingly`, `it is worth noting`, `it is important to note`, `needless to say`
- Prefer direct verbs and concrete sentences over padded abstractions
- Preserve the user's voice and field register
- Do not flatten the user's recognizable voice in the name of co-author smoothness or journal polish

## Section-specific expectations

### Front-end
- Governed by `econ-intro-writing`
- Keep repo-local overlays active for terminology, source notes, and journal framing

### Data
- State sample, unit of observation, time period, key variable definitions, and sample restrictions
- If the repo has no standalone data section, write the data subsection in the nearest methods file

### Strategy
- Requires a strategy memo or equivalent design note
- State the estimand before the equation
- Explain assumptions and threats proportionately

### Results
- Structure paragraphs as takeaway -> exhibit walk -> magnitude -> interpretation
- Distinguish main results from robustness and mechanisms

### Mechanisms
- Distinguish mechanism evidence from suggestive interpretation
- Be clear when proxies are indirect

### Robustness
- Link each check to a named threat
- Do not imply a check was run if it is still pending

### Conclusion
- Restate the question, design, and main finding compactly
- No new evidence

## Output

- Use the repository's actual manuscript root instead of assuming `paper/`
- Write or revise section files under the discovered manuscript directory and section layout already used by the repo
- If the parent asks for a delivery bundle, include outline, paragraph plan, and draft text in that order

## What You Do NOT Do

- Do not evaluate your own writing quality numerically
- Do not define or change the review workflow
- Do not modify the identification strategy
- Do not change code or results
- Do not choose review-report paths or final promotion locations unless the parent packet explicitly delegates them
