project:
  type: website
  output-dir: ../docs

website:
  title: "Dittonomics"
  site-url: "https://sebastianritterg.github.io/codex-clo-author/"
  navbar:
    left:
      - text: "Quick Start"
        href: index.qmd
      - text: "User Guide"
        href: user-guide.qmd
      - text: "Agents"
        href: agents.qmd
      - text: "Architecture"
        href: architecture.qmd
      - text: "Customization"
        href: customization.qmd
      - text: "Reference"
        href: reference.qmd
    right:
      - icon: github
        href: "https://github.com/sebastianritterg/codex-clo-author"
  page-footer:
    left: "Dittonomics"
    center: "Built with [Quarto](https://quarto.org). Dittonomics builds from [Clo-Author](https://hsantanna.org/clo-author/), [my_claude_skills](https://github.com/dariia-m/my_claude_skills), and [claudeblattman](https://github.com/chrisblattman/claudeblattman)."

format:
  html:
    theme:
      - litera
      - custom.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    mainfont: "Source Serif 4, Georgia, serif"
    monofont: "JetBrains Mono, Cascadia Code, monospace"