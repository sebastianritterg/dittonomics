project:
  type: website
  output-dir: ../docs

website:
  title: "Dittonomics"
  site-url: "https://sebastianritterg.github.io/dittonomics/"
  navbar:
    left:
      - text: "Quick Start"
        href: index.qmd
      - text: "User Guide"
        href: user-guide.qmd
      - text: "Agents"
        href: agents.qmd
      - text: "Architecture"
        href: architecture.qmd
      - text: "Customization"
        href: customization.qmd
      - text: "Reference"
        href: reference.qmd
    right:
      - icon: github
        href: "https://github.com/sebastianritterg/dittonomics"
  page-footer:
    left: "Dittonomics"
    center: "Built with [Quarto](https://quarto.org). Dittonomics builds from [Clo-Author](https://hsantanna.org/clo-author/), [my_claude_skills](https://github.com/dariia-m/my_claude_skills), [claudeblattman](https://github.com/chrisblattman/claudeblattman), [strategic-revision](https://github.com/jusi-aalto/strategic-revision), [research-companion](https://github.com/andrehuang/research-companion/), and [idea-evaluation-pipeline](https://github.com/alejandroll10/idea-evaluation-pipeline)."

format:
  html:
    theme:
      - litera
      - custom.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    mainfont: "Source Serif 4, Georgia, serif"
    monofont: "JetBrains Mono, Cascadia Code, monospace"
